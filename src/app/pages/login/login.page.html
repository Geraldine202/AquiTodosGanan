
<ion-header>
  <ion-toolbar class="toolbar-duoc">
    <div class="header-contenido">

      <div class="lado-izquierdo">
        <div class="grupo-clima-menu">
          <ion-buttons>
            <ion-menu-button autoHide="false" class="menu-blanco"></ion-menu-button>
          </ion-buttons>

          <div class="clima-box">
            <ion-icon name="partly-sunny-outline"></ion-icon>
            <span>18°C, Puente Alto</span>
          </div>
        </div>
      </div>
      <div class="lado-derecho">
        <img src="assets/logoDuocBlanco.png" alt="Logo Duoc UC" class="logo-duoc">
      </div>
    </div>
  </ion-toolbar>
</ion-header>


<ion-content [fullscreen]="true" class="login-content ion-no-padding">

  <div class="login-container">

    <div class="login-card">

      <h1>Bienvenido</h1>
      <p>Accede con tu cuenta Duoc UC</p>

      <ion-item class="input-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input placeholder="Correo Institucional"></ion-input>
      </ion-item>

      <ion-item class="input-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input type="password" placeholder="Contraseña"></ion-input>
      </ion-item>

      <ion-button expand="block" color="warning" class="btn-login-main" routerLink="/home">
        Ingresar
      </ion-button>

      <div class="login-extra">
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>

    </div>

  </div>

</ion-content>
