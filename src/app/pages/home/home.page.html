<app-header></app-header>

<ion-content [fullscreen]="true">

  <div class="carrusel-wrapper">
    <swiper-container
      class="home-swiper"
      navigation="true"
      pagination="true"
      loop="true"
      speed="700"
      autoplay-delay="4000"
      autoplay-disable-on-interaction="false"
    >
      <swiper-slide>
        <img src="assets/slide1.jpg" alt="Actividad estudiantil 1">
      </swiper-slide>

      <swiper-slide>
        <img src="assets/slide2.jpg" alt="Actividad estudiantil 2">
      </swiper-slide>

      <swiper-slide>
        <img src="assets/slide3.jpg" alt="Actividad estudiantil 3">
      </swiper-slide>
    </swiper-container>
  </div>

  <div class="contenedor-home ion-padding">
    <h1>Bienvenido/a</h1>
    <p>Sistema académico Duoc UC</p>
  </div>

  <ion-grid class="grid-home">
    <ion-row>

      <ion-col size="6">
        <ion-card routerLink="/puntos">
          <ion-card-content class="card-home">
            <ion-icon name="star-outline"></ion-icon>
            <p>Mis puntos</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card routerLink="/actividades">
          <ion-card-content class="card-home">
            <ion-icon name="walk-outline"></ion-icon>
            <p>Actividades</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card routerLink="/premios">
          <ion-card-content class="card-home">
            <ion-icon name="gift-outline"></ion-icon>
            <p>Premios</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="6">
        <ion-card routerLink="/canje">
          <ion-card-content class="card-home">
            <ion-icon name="swap-horizontal-outline"></ion-icon>
            <p>Canjear</p>
          </ion-card-content>
        </ion-card>
      </ion-col>

    </ion-row>
  </ion-grid>
  <app-footer></app-footer>
</ion-content>
