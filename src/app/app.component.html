<ion-app>

  <ion-menu contentId="main-content" side="start">

    <ion-header>
      <ion-toolbar class="menu-toolbar">
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>

      <ion-list>

        <ion-item 
          (click)="cerrarMenu()"
          routerLink="/login"
          routerLinkActive="selected">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          <ion-label>Iniciar sesión</ion-label>
        </ion-item>

        <ion-item 
          (click)="cerrarMenu()"
          routerLink="/home"
          routerLinkActive="selected"
          [routerLinkActiveOptions]="{ exact: true }">
          <ion-icon name="home-outline" slot="start"></ion-icon>
          <ion-label>Inicio</ion-label>
        </ion-item>

        <ion-item 
          (click)="cerrarMenu()"
          routerLink="/admin-alumnos"
          routerLinkActive="selected">
          <ion-icon name="people-outline" slot="start"></ion-icon>
          <ion-label>Administrar Alumnos</ion-label>
        </ion-item>

        <ion-item 
          (click)="cerrarMenu()"
          routerLink="/admin-actividades"
          routerLinkActive="selected">
          <ion-icon name="calendar-outline" slot="start"></ion-icon>
          <ion-label>Administrar Actividades</ion-label>
        </ion-item>

      </ion-list>

    </ion-content>

  </ion-menu>

  <div class="ion-page" id="main-content">
    <ion-router-outlet></ion-router-outlet>
  </div>

</ion-app>
