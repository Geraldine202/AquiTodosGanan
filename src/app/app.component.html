<ion-app>

  <!-- MENÚ LATERAL GLOBAL -->
  <ion-menu contentId="main-content" side="start" type="overlay" persistent="true">
    
    <!-- ENCABEZADO DEL MENÚ -->
    <ion-header class="ion-no-border">
      <ion-toolbar style=" 
        --background: #001e36; 
        background: linear-gradient(135deg, #001e36 0%, #001122 100%); 
        padding: 16px 12px 12px 12px;
      ">
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <!-- Logo Duoc -->
          <div style="height: 32px; display: flex; align-items: center;">
            <img src="assets/logoDuocBlanco.png" alt="Logo Duoc UC" style="max-height: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));" />
          </div>
          
          <!-- Título y subtítulo institucional -->
          <div>
            <p style="color: #9ca3af; font-size: 0.75rem; margin: 2px 0 0 0;">
              Navegación general
            </p>
          </div>
        </div>
      </ion-toolbar>
    </ion-header>

    <!-- CUERPO DEL MENÚ -->
    <ion-content style="--background: #00172b;">
      <div style="padding: 12px 8px;">
        
        <p style="
          color: #6b7280; 
          font-size: 0.7rem; 
          font-weight: 700; 
          text-transform: uppercase; 
          letter-spacing: 0.8px; 
          padding: 0 12px; 
          margin-bottom: 8px;
        ">
          Menú Principal
        </p>

        <ion-list lines="none" style="background: transparent; padding: 0;">
          
          <!-- Opción: Inicio -->
          <ion-item 
            button
            (click)="cerrarMenu()" 
            routerLink="/home" 
            routerLinkActive="menu-item-activo" 
            [routerLinkActiveOptions]="{ exact: true }"
            class="menu-item-custom">
            <ion-icon name="home-outline" slot="start" class="menu-icon"></ion-icon>
            <ion-label class="menu-label">Inicio</ion-label>
          </ion-item>

          <!-- Opción: Administrar Alumnos -->
          <ion-item 
            button
            (click)="cerrarMenu()" 
            routerLink="/admin-alumnos" 
            routerLinkActive="menu-item-activo"
            class="menu-item-custom">
            <ion-icon name="people-outline" slot="start" class="menu-icon"></ion-icon>
            <ion-label class="menu-label">Administrar Alumnos</ion-label>
          </ion-item>

          <!-- Opción: Administrar Actividades -->
          <ion-item 
            button
            (click)="cerrarMenu()" 
            routerLink="/admin-actividades" 
            routerLinkActive="menu-item-activo"
            class="menu-item-custom">
            <ion-icon name="calendar-outline" slot="start" class="menu-icon"></ion-icon>
            <ion-label class="menu-label">Administrar Actividades</ion-label>
          </ion-item>

        </ion-list>
      </div>
    </ion-content>

    <!-- PIE DEL MENÚ (Versión de la App) -->
    <ion-footer class="ion-no-border" style="background: #001122; border-top: 1px solid rgba(255, 255, 255, 0.08); padding: 12px 16px;">
      <div style="display: flex; justify-content: space-between; align-items: center; color: #6b7280; font-size: 0.72rem;">
        <span>Duoc UC Puente Alto</span>
        <span style="background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px;">v1.0.0</span>
      </div>
    </ion-footer>

  </ion-menu>

  <!-- RUTAS DE NAVEGACIÓN (Poner la ID aquí directamente sin el DIV) -->
  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
