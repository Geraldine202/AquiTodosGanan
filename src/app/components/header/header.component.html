<ion-header class="ion-no-border">
  <ion-toolbar style="
    --background: #001e36; 
    background: linear-gradient(135deg, #001e36 0%, #001122 100%); 
    --color: #ffffff; 
    color: #ffffff; 
    padding: 6px 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
  ">
    
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; height: 50px;">

      <!-- LADO IZQUIERDO: Menú + Logo Duoc + Clima -->
      <div style="display: flex; align-items: center; gap: 12px;">
        
        <!-- Botón de Menú -->
        <ion-buttons slot="start">
          <ion-menu-button autoHide="false" style="--color: #ffffff; color: #ffffff;"></ion-menu-button>
        </ion-buttons>

        <!-- Logo Duoc -->
        <div style="height: 32px; width: 85px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
          <img src="assets/logoDuocBlanco.png" alt="Logo Duoc UC" style="max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));" />
        </div>

        <!-- Divisor sutil -->
        <div style="height: 18px; width: 1px; background: rgba(255, 255, 255, 0.2); margin: 0 2px;"></div>

        <!-- Clima (Cápsula elegante) -->
        <div style="
          display: flex; 
          align-items: center; 
          gap: 6px; 
          background: rgba(255, 255, 255, 0.07); 
          padding: 4px 10px; 
          border-radius: 12px; 
          border: 1px solid rgba(255, 255, 255, 0.1);
          color: #f3f4f6; 
          font-size: 0.78rem;
        ">
          <ion-icon name="partly-sunny-outline" style="font-size: 1.1rem; color: #ffb800;"></ion-icon>
          <span style="white-space: nowrap; font-weight: 500;">18°C, Puente Alto</span>
        </div>
      </div>

      <!-- LADO DERECHO: Login / Panel Usuario + Logout -->
      <div style="display: flex; align-items: center; gap: 10px;">
        
        <!-- ESTADO 1: NO LOGUEADO -->
        <ng-container *ngIf="!usuarioLogueado">
          <ion-button 
            routerLink="/login" 
            style="
              --background: linear-gradient(135deg, #ffc72c 0%, #ffa800 100%); 
              --color: #001e36; 
              --border-radius: 18px; 
              --padding-start: 16px; 
              --padding-end: 16px; 
              font-size: 0.8rem; 
              font-weight: 800; 
              letter-spacing: 0.3px;
              height: 36px;
              margin: 0;
              box-shadow: 0 4px 12px rgba(255, 184, 0, 0.35);
            ">
            <ion-icon name="person-circle-outline" slot="start" style="font-size: 1.2rem; margin-right: 2px;"></ion-icon>
            Iniciar sesión
          </ion-button>
        </ng-container>

        <!-- ESTADO 2: LOGUEADO -->
        <ng-container *ngIf="usuarioLogueado">
          
          <!-- Badge Saludo con estado activo -->
          <div style="
            display: flex; 
            align-items: center; 
            gap: 6px; 
            background: rgba(255, 255, 255, 0.08); 
            padding: 5px 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.12);
          ">
            <!-- Punto indicador online -->
            <div style="width: 7px; height: 7px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981;"></div>
            
            <span style="color: #e5e7eb; font-size: 0.8rem; font-weight: 500; white-space: nowrap;">
              Hola, <strong style="color: #ffb800; font-weight: 700;">{{ usuarioLogueado.nombre || usuarioLogueado.nombre_completo || 'Alumno' }}</strong>
            </span>
          </div>

          <!-- BOTÓN CERRAR SESIÓN ESTILO ATRACTIVO/RED -->
          <ion-button 
            (click)="cerrarSesion()" 
            style="
              --background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
              --color: #ffffff; 
              --border-radius: 20px;
              --padding-start: 14px;
              --padding-end: 16px;
              font-size: 0.8rem; 
              font-weight: 700; 
              height: 36px;
              margin: 0;
              box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35);
            ">
            <ion-icon name="log-out-outline" slot="start" style="font-size: 1.15rem; color: #ffffff; margin-right: 2px;"></ion-icon>
            Cerrar sesión
          </ion-button>
        </ng-container>

      </div>

    </div>

  </ion-toolbar>
</ion-header>
